<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 Switch 卡带收藏馆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs" defer></script>
    <style>
        [x-cloak] { display: none !important; }
        .switch-red { background-color: #E60012; }
        .switch-blue { background-color: #00A0E3; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans" x-data="gameManager()" x-init="init()">

    <!-- 导航栏 -->
    <nav class="switch-red text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center">
                <span class="mr-2">🎮</span> Switch Collection
            </h1>
            <div class="text-sm">
                合计: <span class="text-xl font-mono" x-text="games.length"></span> 枚卡带
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-8">
        
        <!-- 操作栏 -->
        <div class="flex flex-wrap gap-4 mb-8">
            <button @click="showModal = true" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-full shadow transition">
                + 添加新卡带
            </button>
            <button @click="exportData()" class="bg-gray-700 hover:bg-gray-800 text-white px-6 py-2 rounded-full shadow transition">
                💾 备份数据
            </button>
        </div>

        <!-- 游戏列表网格 -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <template x-for="(game, index) in games" :key="index">
                <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-shadow group relative">
                    <!-- 删除按钮 -->
                    <button @click="deleteGame(index)" class="absolute top-2 right-2 bg-black/50 text-white w-8 h-8 rounded-full opacity-0 group-hover:opacity-100 transition">✕</button>
                    
                    <!-- 封面图 -->
                    <div class="aspect-[2/3] bg-gray-200">
                        < img :src="game.cover || 'https://via.placeholder.com/200x300?text=No+Cover'" 
                             class="w-full h-full object-cover">
                    </div>
                    
                    <!-- 信息 -->
                    <div class="p-3">
                        <h3 class="font-bold text-gray-800 truncate" x-text="game.title"></h3>
                        <div class="flex justify-between items-center mt-2">
                            <span :class="{
                                'bg-red-100 text-red-600': game.region === '日版',
                                'bg-blue-100 text-blue-600': game.region === '港版',
                                'bg-green-100 text-green-600': game.region === '美版'
                            }" class="text-[10px] px-2 py-1 rounded font-bold" x-text="game.region"></span>
                            <span class="text-xs text-gray-500" x-text="game.status"></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- 空状态 -->
        <div x-show="games.length === 0" class="text-center py-20 text-gray-400">
            <p class="text-xl">还没有收藏任何卡带，点击上方按钮添加吧！</p >
        </div>
    </div>

    <!-- 添加弹窗 -->
    <div x-show="showModal" x-cloak class="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl p-6 w-full max-w-md">
            <h2 class="text-xl font-bold mb-4">添加新卡带</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">游戏名称</label>
                    <input type="text" x-model="newGame.title" class="w-full border rounded p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">封面图片链接 (URL)</label>
                    <input type="text" x-model="newGame.cover" placeholder="https://..." class="w-full border rounded p-2 mt-1">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">版本</label>
                        <select x-model="newGame.region" class="w-full border rounded p-2 mt-1">
                            <option>港版</option>
                            <option>日版</option>
                            <option>美版</option>
                            <option>欧版</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">状态</label>
                        <select x-model="newGame.status" class="w-full border rounded p-2 mt-1">
                            <option>已通关</option>
                            <option>游玩中</option>
                            <option>吃灰中</option>
                            <option>想卖掉</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button @click="showModal = false" class="text-gray-500 px-4 py-2">取消</button>
                <button @click="addGame()" class="switch-red text-white px-6 py-2 rounded shadow">保存</button>
            </div>
        </div>
    </div>

    <script>
        function gameManager() {
            return {
                games: [],
                showModal: false,
                newGame: {
                    title: '',
                    cover: '',
                    region: '港版',
                    status: '游玩中'
                },
                init() {
                    const saved = localStorage.getItem('switch_collection');
                    if (saved) this.games = JSON.parse(saved);
                },
                addGame() {
                    if (!this.newGame.title) return alert('请输入游戏名称');
                    this.games.push({...this.newGame});
                    this.save();
                    this.showModal = false;
                    this.newGame = { title: '', cover: '', region: '港版', status: '游玩中' };
                },
                deleteGame(index) {
                    if (confirm('确定要删除这条记录吗？')) {
                        this.games.splice(index, 1);
                        this.save();
                    }
                },
                save() {
                    localStorage.setItem('switch_collection', JSON.stringify(this.games));
                },
                exportData() {
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.games));
                    const downloadAnchorNode = document.createElement
