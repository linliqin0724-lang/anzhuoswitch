<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Switch Collection - Noir Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #fff; }
        
        /* 书架样式 */
        .shelf-row {
            border-bottom: 8px solid #1a1a1a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 2rem;
            padding-bottom: 4px;
        }
        .game-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: bottom;
        }
        .game-card:hover {
            transform: translateY(-15px) scale(1.05);
            z-index: 10;
        }
        /* 极简滚动条 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body x-data="gameManager()" x-init="init()">

    <!-- 个人主页头部 -->
    <header class="pt-12 pb-8 px-6 border-b border-white/10 bg-black">
        <div class="container mx-auto max-w-5xl">
            <div class="flex flex-col md:flex-row items-center gap-8">
                <!-- 头像 -->
                <div class="w-24 h-24 rounded-full border-4 border-white overflow-hidden bg-white">
                    <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=switch" class="w-full h-full">
                </div>
                <!-- 统计 -->
                <div class="flex-1 text-center md:text-left">
                    <h1 class="text-4xl font-black tracking-tighter mb-2">COLLECTOR_0724</h1>
                    <div class="flex flex-wrap justify-center md:justify-start gap-6 text-sm uppercase tracking-widest text-gray-400">
                        <div><span class="text-white font-bold" x-text="games.length"></span> 藏品</div>
                        <div><span class="text-white font-bold">¥</span><span class="text-white font-bold" x-text="totalSpent"></span> 市值</div>
                        <div>日均消耗 <span class="text-white font-bold">¥</span><span class="text-white font-bold" x-text="totalDailyAvg"></span></div>
                    </div>
                </div>
                <!-- 操作区 -->
                <div class="flex gap-3">
                    <button @click="openAddModal()" class="bg-white text-black px-6 py-2 rounded-full font-bold hover:bg-gray-200 transition">入库</button>
                    <button @click="exportData()" class="border border-white/20 px-4 py-2 rounded-full hover:bg-white/10">备份</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto max-w-5xl p-6">
        <!-- 书架视图 -->
        <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-x-6 gap-y-12">
            <template x-for="(game, index) in games" :key="index">
                <div class="flex flex-col items-center">
                    <!-- 游戏卡带盒 -->
                    <div @click="viewDetail(index)" class="game-card cursor-pointer w-full aspect-[2/3] bg-zinc-900 rounded-sm overflow-hidden shadow-2xl relative border border-white/5">
                        <img :src="game.cover || 'https://via.placeholder.com/200x300?text=NO+IMAGE'" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-500">
                        <!-- 侧边标签颜色 -->
                        <div class="absolute top-0 left-0 w-1 h-full" :class="getRegionColor(game.region)"></div>
                    </div>
                    <!-- 书架横梁 -->
                    <div class="w-[120%] h-2 bg-zinc-800 mt-[-2px] rounded-full shadow-lg"></div>
                    <p class="mt-3 text-[10px] text-gray-500 font-medium truncate w-full text-center uppercase" x-text="game.title"></p>
                </div>
            </template>
        </div>

        <!-- 空状态 -->
        <div x-show="games.length === 0" class="text-center py-32 border-2 border-dashed border-white/5 rounded-3xl">
            <p class="text-gray-600 tracking-widest uppercase">书架空空如也，请添加卡带</p>
        </div>
    </main>

    <!-- 详情查看弹窗 -->
    <div x-show="showDetail" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl">
        <template x-if="selectedGame">
            <div class="bg-zinc-900 border border-white/10 rounded-3xl overflow-hidden max-w-2xl w-full flex flex-col md:flex-row">
                <div class="md:w-1/2 aspect-[2/3] bg-black">
                    <img :src="selectedGame.cover" class="w-full h-full object-cover">
                </div>
                <div class="p-8 md:w-1/2 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] border border-white/20 px-2 py-1 rounded text-gray-400 uppercase" x-text="selectedGame.region"></span>
                            <div class="flex gap-2">
                                <button @click="editCurrent()" class="text-gray-400 hover:text-white">编辑</button>
                                <button @click="closeDetail()" class="text-white text-xl">✕</button>
                            </div>
                        </div>
                        <h2 class="text-3xl font-black mb-6 leading-none" x-text="selectedGame.title"></h2>
                        <div class="space-y-4 text-sm">
                            <div class="flex justify-between border-b border-white/5 pb-2">
                                <span class="text-gray-500">入手价格</span>
                                <span>¥<span x-text="selectedGame.price"></span></span>
                            </div>
                            <div class="flex justify-between border-b border-white/5 pb-2">
                                <span class="text-gray-500">入手日期</span>
                                <span x-text="selectedGame.purchaseDate"></span>
                            </div>
                            <div class="flex justify-between border-b border-white/5 pb-2">
                                <span class="text-gray-500">当前状态</span>
                                <span x-text="selectedGame.status"></span>
                            </div>
                        </div>
                    </div>
                    <div class="mt-12 p-4 bg-white text-black rounded-2xl">
                        <p class="text-[10px] uppercase font-bold opacity-50">日均持有价值</p>
                        <p class="text-4xl font-black">¥<span x-text="calcDaily(selectedGame)"></span></p>
                    </div>
                </div>
